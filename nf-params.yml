## ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
##     nf-core/fishnetpipeline 1.0.0dev
## ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
##     This is an example parameter file to pass to the `-params-file` option
##     of nextflow run with the nf-core/fishnetpipeline pipeline.
##      
##     Uncomment lines with a single '#' if you want to pass the parameter to
##     the pipeline.
## -----------------------------------------------------------------------------

## =============================================================================
## Input/output options
## =============================================================================
## Define where the pipeline should find input data and save output data.

## -----------------------------------------------------------------------------
## input
## -----------------------------------------------------------------------------
##     Path to  input summary statistics file. Summary statistics files must
##     be CSV files with colnames "Genes" and "p_vals".
##     Type: string
##     Required
## -----------------------------------------------------------------------------
# input: null

## -----------------------------------------------------------------------------
## input_modules
## -----------------------------------------------------------------------------
##     Path to directory containing input network module files. Network
##     module files must be tab-delimited .txt files.
##     Type: string
##     Required
## -----------------------------------------------------------------------------
# input_modules: null

## -----------------------------------------------------------------------------
## input_networks
## -----------------------------------------------------------------------------
##     Path to the directory containing input network files. Names should
##     correspond to the files in the input_modules directory. Files must be
##     tab-separated .txt files with three columns: Source, Target, and
##     Score.
##     Type: string
##     Required
## -----------------------------------------------------------------------------
# input_networks: null

## -----------------------------------------------------------------------------
## outdir
## -----------------------------------------------------------------------------
##     The output directory where the results will be saved. You have to use
##     absolute paths to storage on Cloud infrastructure.
##     Type: string
##     Required
## -----------------------------------------------------------------------------
# outdir: null

## -----------------------------------------------------------------------------
## email
## -----------------------------------------------------------------------------
##     Email address for completion summary.
##     Type: string
## -----------------------------------------------------------------------------
# email: null


## =============================================================================
## FISHNET specific options
## =============================================================================

## -----------------------------------------------------------------------------
## FDR_threshold
## -----------------------------------------------------------------------------
##     Specify a custom FDR threshold cutoff (default: 0.05)
##     Type: number
## -----------------------------------------------------------------------------
# FDR_threshold: 0.05

## -----------------------------------------------------------------------------
## percentile_threshold
## -----------------------------------------------------------------------------
##     Specify a custom percentile threshold cutoff (default: 99)
##     Type: integer
## -----------------------------------------------------------------------------
# percentile_threshold: 99

## -----------------------------------------------------------------------------
## bonferroni_alpha
## -----------------------------------------------------------------------------
##     Specify a custom threshold cutoff for module significance after
##     Bonferrnoi correction
##     Type: number
## -----------------------------------------------------------------------------
# bonferroni_alpha: 0.05

## -----------------------------------------------------------------------------
## trait
## -----------------------------------------------------------------------------
##     Name of the input trait
##     Type: string
##     Required
## -----------------------------------------------------------------------------
# trait: null

## -----------------------------------------------------------------------------
## pipeline
## -----------------------------------------------------------------------------
##     Name of the input pipeline
##     Type: string
##     Required
## -----------------------------------------------------------------------------
# pipeline: null

## -----------------------------------------------------------------------------
## geneColName
## -----------------------------------------------------------------------------
##     Column name of the input summary statistics file corresponding to gene
##     names
##     Type: string
## -----------------------------------------------------------------------------
# geneColName: "Genes"

## -----------------------------------------------------------------------------
## pvalColName
## -----------------------------------------------------------------------------
##     Column name of the input summary statistics file corresponding to
##     p-values
##     Type: string
## -----------------------------------------------------------------------------
# pvalColName: "p_vals"

## -----------------------------------------------------------------------------
## GO_summaries_path
## -----------------------------------------------------------------------------
##     directory to write GO summaries
##     Type: string
## -----------------------------------------------------------------------------
# GO_summaries_path: "GO_summaries"

## -----------------------------------------------------------------------------
## masterSummaries_path
## -----------------------------------------------------------------------------
##     directory to write master summaries files
##     Type: string
## -----------------------------------------------------------------------------
# masterSummaries_path: "masterSummaries"

## -----------------------------------------------------------------------------
## numTests
## -----------------------------------------------------------------------------
##     Number of tests (genes) for multiple testing correction
##     Type: integer
## -----------------------------------------------------------------------------
# numTests: null


